services:
  agentmemory:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENTMEMORY_VERSION: "0.9.27"
        III_VERSION: "0.11.2"
        III_SDK_VERSION: "0.11.2"
    restart: unless-stopped
    environment:
      SERVICE_FQDN_AGENTMEMORY_3111: ${SERVICE_FQDN_AGENTMEMORY_3111}
      # Viewer (porta 3113) exposto na rede: bind 0.0.0.0 + allowlist de Host.
      # Exige AGENTMEMORY_SECRET (o entrypoint exporta de /data/.hmac).
      AGENTMEMORY_VIEWER_HOST: "0.0.0.0"
      VIEWER_ALLOWED_HOSTS: "memory-view.ocati.com.br"
      # Compressão semântica via Gemini (valor real vem do Environment do Dokploy).
      # Alternativa: troque por ANTHROPIC_API_KEY / OPENROUTER_API_KEY.
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      # Usa o Gemini de fato: compressão LLM por observação + knowledge graph.
      AGENTMEMORY_AUTO_COMPRESS: "true"
      GRAPH_EXTRACTION_ENABLED: "true"
      # Team sharing: habilita escopo por (TEAM_ID, USER_ID). O tuple vem do cliente
      # (cada repo manda seu TEAM_ID: ocati/wizo). Não fixar TEAM_ID aqui — é multi-time.
      TEAM_MODE: "shared"
    expose:
      - "3111"
      - "3112"
      - "3113"
    volumes:
      - agentmemory-data:/data
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.services.am.loadbalancer.server.port=3111
      - traefik.http.services.amview.loadbalancer.server.port=3113
      - traefik.http.services.amstream.loadbalancer.server.port=3112

      # ---- API: memory.ocati.com.br (viewer bloqueado) ----
      - traefik.http.routers.am-api.rule=Host(`memory.ocati.com.br`)
      - traefik.http.routers.am-api.entrypoints=websecure
      - traefik.http.routers.am-api.tls.certresolver=letsencrypt
      - traefik.http.routers.am-api.service=am

      - "traefik.http.routers.am-block.rule=Host(`memory.ocati.com.br`) && PathPrefix(`/agentmemory/viewer`)"
      - traefik.http.routers.am-block.entrypoints=websecure
      - traefik.http.routers.am-block.tls.certresolver=letsencrypt
      - traefik.http.routers.am-block.priority=100
      - traefik.http.routers.am-block.service=am
      - traefik.http.routers.am-block.middlewares=am-deny
      - traefik.http.middlewares.am-deny.ipallowlist.sourcerange=127.0.0.1/32

      # ---- Viewer: memory-view.ocati.com.br -> porta 3113 (login + token) ----
      # Segredos via Environment do Dokploy: AGENTMEMORY_SECRET, VIEWER_USERS
      - traefik.http.routers.am-view.rule=Host(`memory-view.ocati.com.br`)
      - traefik.http.routers.am-view.entrypoints=websecure
      - traefik.http.routers.am-view.tls.certresolver=letsencrypt
      - traefik.http.routers.am-view.service=amview
      - traefik.http.routers.am-view.middlewares=am-auth,am-token
      - traefik.http.middlewares.am-auth.basicauth.users=${VIEWER_USERS}
      - traefik.http.middlewares.am-token.headers.customrequestheaders.Authorization=Bearer ${AGENTMEMORY_SECRET}

      # ---- WebSocket ao vivo do viewer: /stream -> porta 3112 (mesmo login+token) ----
      # Cliente conecta em wss://memory-view.ocati.com.br:443/stream/... (abrir com ?wsPort=443)
      - "traefik.http.routers.am-stream.rule=Host(`memory-view.ocati.com.br`) && PathPrefix(`/stream`)"
      - traefik.http.routers.am-stream.entrypoints=websecure
      - traefik.http.routers.am-stream.tls.certresolver=letsencrypt
      - traefik.http.routers.am-stream.priority=200
      - traefik.http.routers.am-stream.service=amstream
      - traefik.http.routers.am-stream.middlewares=am-auth,am-token,am-wsroot
      # streams (3112) parece servir o WS no root; reescreve /stream/mem-live/viewer -> /
      - traefik.http.middlewares.am-wsroot.stripprefix.prefixes=/stream/mem-live/viewer
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3111/agentmemory/livez || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  agentmemory-data:

networks:
  dokploy-network:
    external: true
